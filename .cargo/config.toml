# [unstable]
# build-std = ["std", "panic_abort", "core", "alloc"]
# build-std-features = ["panic_immediate_abort"]
# build-std = ["std", "core", "alloc"]
# build-std-features = ["panic_immediate_abort"]

[build]
# Necessary for leptos_use clipboard feature. See https://rustwasm.github.io/docs/wasm-bindgen/web-sys/unstable-apis.html.
rustflags = [
  "--cfg=leptos_debuginfo",
  "--cfg=erase_components",
]

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold", "--cfg=leptos_debuginfo", "--cfg=erase_components"]
